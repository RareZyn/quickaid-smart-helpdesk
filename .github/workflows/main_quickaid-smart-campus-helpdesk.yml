# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - quickaid-smart-campus-helpdesk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_MSAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_MSAL_CLIENT_ID }}
          NEXT_PUBLIC_MSAL_TENANT_ID: ${{ secrets.NEXT_PUBLIC_MSAL_TENANT_ID }}
          NEXT_PUBLIC_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_REDIRECT_URI }}
        run: npm run build

      - name: Compile custom WebSocket server
        working-directory: frontend
        run: |
          npx esbuild server.ts \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=cjs \
            --external:next \
            --external:ws \
            --outfile=server.js

      - name: Prune dev dependencies
        working-directory: frontend
        run: npm prune --production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r frontend/.next deploy/.next
          cp -r frontend/public deploy/public
          cp frontend/server.js deploy/server.js
          cp frontend/package.json deploy/package.json
          mv frontend/node_modules deploy/node_modules
          rm -rf deploy/.next/cache

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E0769A4DADEB48CEAB7FE44D344D7A33 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2A0CA79FE2684D2496C3511D2A2713FE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_03DD1217773E4E7F9CB16B8211A59AE8 }}

      - name: Configure Azure Web App runtime settings
        run: |
          az webapp config appsettings set \
            --name quickaid-smart-campus-helpdesk \
            --resource-group $(az webapp list --query "[?name=='quickaid-smart-campus-helpdesk'].resourceGroup" -o tsv) \
            --settings HOSTNAME=0.0.0.0 NODE_ENV=production

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'quickaid-smart-campus-helpdesk'
          slot-name: 'Production'
          package: .
          startup-command: 'node server.js'
